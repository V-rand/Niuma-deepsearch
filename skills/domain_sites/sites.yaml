# Authoritative site directory for domain-locked web_search.
# Format: domain_key: [list of domains (no https://, no path)]
# Order = priority. Add domains by appending to list.
#
# Usage: call domain_sites(domain="key") to get site_operators + include_domains.
# For multi-domain questions, call domain_sites() once per relevant domain.
#
# ═══════════════════════════════════════════════════════════════════
# TIER 1: ELITE MULTIDISCIPLINARY — used across many fields
# ═══════════════════════════════════════════════════════════════════

elite_multidisciplinary:
  - nature.com            # Nature (all sciences)
  - science.org           # Science (AAAS, all sciences)
  - pnas.org              # PNAS (broad)
  - cell.com              # Cell Press (life sciences)
  - nejm.org              # New England Journal of Medicine (top clinical)
  - thelancet.com         # The Lancet (top medical)
  - bmj.com               # British Medical Journal
  - springer.com          # Springer Nature (all fields)
  - ieeexplore.ieee.org   # IEEE (engineering/CS/EE)
  - dl.acm.org            # ACM Digital Library (CS)
  - jstor.org             # JSTOR (humanities/social sciences)
  - plos.org              # PLOS (open access, all fields)
  - wiley.com             # Wiley (all fields)
  - tandfonline.com       # Taylor & Francis (all fields)
  - elsevier.com          # Elsevier (all fields)
  - sagepub.com           # SAGE (social sciences)

